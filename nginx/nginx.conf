# Replace all occurrences of ngclean.com.au with your actual domain

events {}

http {
    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name ngclean.com.au www.ngclean.com.au s3.ngclean.com.au minio.ngclean.com.au;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Next.js app
    server {
        listen 443 ssl;
        server_name ngclean.com.au www.ngclean.com.au;

        ssl_certificate     /etc/letsencrypt/live/ngclean.com.au/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ngclean.com.au/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 50M;

        location / {
            proxy_pass         http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # MinIO S3 API
    server {
        listen 443 ssl;
        server_name s3.ngclean.com.au;

        ssl_certificate     /etc/letsencrypt/live/ngclean.com.au/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ngclean.com.au/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 100M;

        location / {
            proxy_pass         http://minio:9000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # MinIO Console
    server {
        listen 443 ssl;
        server_name minio.ngclean.com.au;

        ssl_certificate     /etc/letsencrypt/live/ngclean.com.au/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ngclean.com.au/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://minio:9001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
